publish:
  stage: deploy
  tags:
    - shared
  only:
    variables:
      - $PUBLISH
  when: on_success
  allow_failure: false
  before_script:
    - source /etc/profile
    - nvm use
    - git fetch --all
    - npm set registry "http://bnpm.byted.org/"
    - npm set //bnpm.byted.org/:_authToken $NPM_TOKEN
    - git fetch && git checkout $CI_COMMIT_REF_NAME
  script:
    - >
      if [ $CI_BUILD_REF_NAME == master ]; then
        npm publish
      else
        exit 1;
      fi;
