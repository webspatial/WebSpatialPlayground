image: hub.byted.org/toutiao.nodejs:latest

# 配置缓存策略，前端工程一般缓存 node_modules 即可
cache:
  key: "$CI_PROJECT_PATH-$CI_COMMIT_REF_SLUG"
  paths:
    - node_modules/

before_script:  # 脚本执行前进行分支拉取和依赖安装
  - git fetch --all
  - source /etc/profile
  - nvm use
  - export YARN_VERSION=1.9.4
  - ([ ! $(command -v yarn) ] || [ ! $(yarn -v | grep $YARN_VERSION) ]) && npm install -g yarn@$YARN_VERSION --registry http://bnpm.byted.org/
  - yarn install --registry=http://bnpm.byted.org

